name: Deploy to VPS

on:
  push:
    branches:
      - main   # Автодеплой при пуше в main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Клонируем репозиторий
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Устанавливаем JDK 25
      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      # 3. Кэшируем Gradle (ускоряет сборку)
      - name: Cache Gradle packages
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # 4. Собираем проект через Gradle (создаёт fat JAR в build/libs/)
      - name: Build with Gradle
        run: ./gradlew clean bootJar -x test   # bootJar для Spring Boot, или просто jar

      # 5. (Опционально) Проверяем, что JAR создался
      - name: List built JAR
        run: ls -la build/libs/

      # 6. Копируем JAR на VPS через SCP
      - name: Copy JAR to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "build/libs/my-app-*.jar"
          target: "/opt/my-app/"
          strip_components: 2          # убирает путь build/libs/
          overwrite: true

      # 7. Переименовываем JAR в фиксированное имя (для удобства systemd)
      - name: Rename JAR on VPS
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            # Находим скопированный JAR (имя может отличаться)
            cd /opt/my-app/
            mv my-app-*.jar my-app.jar

      # 8. Перезапускаем systemd-сервис
      - name: Restart service
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            sudo systemctl daemon-reload      # если файл сервиса изменился
            sudo systemctl restart my-app     # название вашего сервиса
            sudo systemctl status my-app --no-pager